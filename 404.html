<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#1d4ed8;
  --accent-text:#93c5fd;
  --hero-bg:#0f172a;
  --ink:#0f172a;
  --slate:#64748b;
  --border:#e2e8f0;
  --white:#fff;
}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--hero-bg);color:#fff;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}

/* dot grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(37,99,235,.15),transparent 70%);
  pointer-events:none;z-index:0;
}

nav{
  position:relative;z-index:1;
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:0 32px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  max-width:1160px;margin:0 auto;width:100%;
}
.logo{
  display:flex;align-items:center;gap:9px;
  font-size:1rem;font-weight:900;letter-spacing:.05em;
}
.logo span{color:var(--accent-text)}
.nav-btn{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);
  font-size:.8rem;font-weight:600;padding:7px 18px;border-radius:6px;
  border:1px solid rgba(255,255,255,.1);transition:background .15s;
}
.nav-btn:hover{background:rgba(255,255,255,.14)}

main{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:60px 32px;
}
.content{text-align:center;max-width:480px}
.code{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(6rem,18vw,10rem);font-weight:800;
  line-height:1;color:rgba(255,255,255,.06);
  letter-spacing:-.04em;margin-bottom:-20px;
  user-select:none;
}
.eyebrow{
  font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent-text);margin-bottom:20px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.eyebrow::before,.eyebrow::after{content:'';width:20px;height:1px;background:var(--accent-text)}
h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;
  color:#fff;line-height:1.15;margin-bottom:16px;
}
p{
  font-size:.95rem;color:rgba(255,255,255,.48);
  line-height:1.8;margin-bottom:36px;
}
.actions{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.btn-home{
  background:var(--accent);color:#fff;
  font-size:.88rem;font-weight:700;padding:12px 28px;border-radius:6px;
  transition:background .15s;
}
.btn-home:hover{background:#2563eb}
.btn-back{
  font-size:.86rem;font-weight:600;color:rgba(255,255,255,.45);
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.18);transition:color .15s;
  cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;
}
.btn-back:hover{color:#fff}

footer{
  position:relative;z-index:1;text-align:center;
  padding:24px 32px;border-top:1px solid rgba(255,255,255,.06);
  font-size:.73rem;color:rgba(255,255,255,.25);
}
footer a{color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.15);transition:color .12s}
footer a:hover{color:rgba(255,255,255,.75)}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect width="24" height="24" rx="6" fill="#1d4ed8"/>
      <rect x="5" y="5" width="6" height="6" rx="1.5" fill="white"/>
      <rect x="13" y="5" width="6" height="6" rx="1.5" fill="white" opacity=".5"/>
      <rect x="5" y="13" width="6" height="6" rx="1.5" fill="white" opacity=".5"/>
      <rect x="13" y="13" width="6" height="6" rx="1.5" fill="white"/>
    </svg>
    YOUR<span>TOOL</span>
  </a>
  <a href="/" class="nav-btn">← Back to home</a>
</nav>

<main>
  <div class="content">
    <div class="code">404</div>
    <div class="eyebrow">Page not found</div>
    <h1>This page doesn't exist.</h1>
    <p>The link you followed may be broken, outdated, or the page may have been moved. Check the URL or head back to the homepage.</p>
    <div class="actions">
      <a href="/" class="btn-home">Go to homepage →</a>
      <button class="btn-back" onclick="history.back()">Go back</button>
    </div>
  </div>
</main>

<footer>
  <!-- attribution — please keep this line -->
  Built with <a href="https://gauravs19.github.io/gs-theme/">gs-theme</a>
  by <a href="https://gauravs19.github.io/portfolio/">Gaurav Sharma</a>
</footer>

</body>
</html>
